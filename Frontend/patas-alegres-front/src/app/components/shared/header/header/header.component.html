<header class="bg-primary text-primary-foreground shadow-md">
  <div class="container mx-auto px-4">
    <nav class="d-flex items-center justify-between flex-wrap py-6">
      <div class="d-flex items-center flex-shrink-0 mr-6">
        <a routerLink="/" class="logo">Patas Alegres</a>
      </div>
      <div class="block lg:hidden">
        <button (click)="toggleMenu()" class="menu-button">
          <svg class="fill-current h-3 w-3" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <title>Menu</title>
            <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"/>
          </svg>
        </button>
      </div>
      <div [ngClass]="{'hidden': !isMenuOpen, 'open': isMenuOpen}" class="w-full block flex-grow lg:flex lg:items-center lg:w-auto nav-links">
        <div class="text-sm lg:flex-grow">
          <a routerLink="/zone" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent mr-4">
            Zona
          </a>
          <a routerLink="/shelter" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent mr-4">
            Refugio
          </a>
          <a routerLink="/animal" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent mr-4">
            Animal
          </a>
          <a routerLink="/breed" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent mr-4">
            Razas
          </a>
          <a routerLink="/vet" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent mr-4">
            Veterinarias
          </a>
          <a routerLink="/person" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent mr-4">
            Personas
          </a>
          <a routerLink="/rescue" routerLinkActive="active" class="block mt-4 lg:inline-block lg:mt-0 hover:text-accent">
            Rescates
          </a>
        </div>
      </div>
    </nav>
  </div>
</header>
