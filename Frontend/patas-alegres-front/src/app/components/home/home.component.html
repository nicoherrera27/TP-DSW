<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6 text-center">Bienvenido a patas alegres!!!</h1>

  <section class="mb-8">
    <h2 class="text-2xl font-semibold mb-4">Filtrar Animales</h2>
    <div class="flex flex-wrap gap-4">
      <div>
        <label for="breedFilter" class="block text-gray-700 font-semibold">Raza</label>
        <select id="breedFilter" [(ngModel)]="selectedBreed" (change)="filterAnimals()" class="form-select w-full">
          <option value="">Todas las Razas</option>
          <option *ngFor="let breed of uniqueBreeds" [value]="breed">{{ breed }}</option>
        </select>
      </div>

      <div>
        <label for="sortOrder" class="block text-gray-700 font-semibold">Ordenar</label>
        <select id="sortOrder" [(ngModel)]="sortOrder" (change)="sortAnimals()" class="form-select w-full">
          <option value="asc">A-Z</option>
          <option value="desc">Z-A</option>
        </select>
      </div>

      <div>
        <label for="zoneFilter" class="block text-gray-700 font-semibold">Zona</label>
        <select id="zoneFilter" [(ngModel)]="selectedZone" (change)="filterAnimals()" class="form-select w-full" disabled="disabled">
          <option value="">Todas las Zonas</option>
          <option *ngFor="let zone of uniqueZones" [value]="zone">{{ zone }}</option>
        </select>
      </div>
    </div>
  </section>

  <section class="mb-8">
    <h2 class="text-2xl font-semibold mb-4">Animales Rescatados</h2>
    <div class="grid grid-cols-1 gap-4">
      <div *ngFor="let animal of filteredAnimals" class="bg-white rounded-lg shadow-md p-4">
        <img [src]="animal.images" [alt]="animal.name" class="w-full h-48 object-cover rounded-md mb-2">
        <h3 class="text-lg font-semibold">{{animal.name}}</h3>
        <p class="text-gray-600">{{animal.breed.name}}</p>
        <div class="p-3">
          <a *ngIf="animal.id" [routerLink]="['/adopt', animal.id.toString()]" class="btn btn-primary">Adoptar</a>
        </div>
      </div>
    </div>
  </section>
  
  <section>
    <h2 class="text-2xl font-semibold mb-4">Refugios Disponibles</h2>
    <div class="grid grid-cols-1 gap-4">
      <div *ngFor="let shelter of shelterService.shelters" class="bg-white rounded-lg shadow-md p-4">
        <h3 class="text-lg font-semibold">{{shelter.name}}</h3>
        <p>Zona: {{shelter.zone.name}}</p>
        <p class="text-gray-600">{{shelter.address}}</p>
      </div>
    </div>
  </section>
</div>
