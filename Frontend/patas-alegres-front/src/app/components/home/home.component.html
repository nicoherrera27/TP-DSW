<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6 text-center">Bienvenidos a {{title}}!!!</h1>

  <section class="mb-8">
    <h2 class="text-2xl font-semibold mb-4">Animales Rescatados</h2>
    <div class="grid grid-cols-1 gap-4">
      <div *ngFor="let animal of animalService.animals" class="bg-white rounded-lg shadow-md p-4">
        <img [src]="animal.images" [alt]="animal.name" class="w-full h-48 object-cover rounded-md mb-2">
        <h3 class="text-lg font-semibold">{{animal.name}}</h3>
        <p class="text-gray-600">{{animal.breed}}</p>
        <div class="p-3">
          <a *ngIf="animal.id" [routerLink]="['/adopt', animal.id.toString()]" class="btn btn-primary">Adoptar</a>
        </div>
      </div>
    </div>
  </section>
  
  <section>
    <h2 class="text-2xl font-semibold mb-4">Refugios Disponibles</h2>
    <div class="grid grid-cols-1 gap-4">
      <div *ngFor="let shelter of shelterService.shelters" class="bg-white rounded-lg shadow-md p-4">
        <h3 class="text-lg font-semibold">{{shelter.name}}</h3>
        <p>Zona: {{shelter.zone.name}}</p>
        <p class="text-gray-600">{{shelter.address}}</p>
      </div>
    </div>
  </section>
</div>
