<h2>Crear Raza</h2>
<form [formGroup]="breedForm" (submit)="postBreed()">
  <fieldset>
    <label for="name">Nombre:</label><br>
    <input type="text" id="zone-name" name="name" formControlName="name"><br>
    <input type="text" id="zone-description" description="description" formControlName="description"><br>
    <input type="text" id="zone-animals" name="animals" formControlName="animals"><br>
    <br><br>
  </fieldset>
  <button class="btn">Crear raza</button>
</form>
