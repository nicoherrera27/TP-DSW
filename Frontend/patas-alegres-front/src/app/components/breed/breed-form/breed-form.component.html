<h2>Crear Zona</h2>
<form [formGroup]="breedForm" (submit)="postBreed()">
  <fieldset>
    <label for="name">Nombre:</label><br>
    <input type="text" id="zone-name" name="name" formControlName="name">
    <input type="text" id="zone-description" description="description" formControlName="description">
    <input type="text" id="zone-animals" name="animals" formControlName="animals">
    <br><br>
  </fieldset>
  <button class="btn">Crear zona</button>
</form>
