<h1>Zonas: </h1>

<ul>
  <li *ngFor="let zone of zoneService.zones; let i = index">
    <a [routerLink]="zone.id.toString()">
      <h2>{{ zone.name }}</h2>
    </a>
    <ul>
      <li *ngFor="let shelter of zone.shelters">
        <h3>Refugios:</h3>
        {{ shelter.name }} - {{ shelter.address }}
      </li>
    </ul>
  </li>
</ul>

<app-zone-form></app-zone-form>
